name: Frontend CI

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - "vite/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - "vite/**"
      - ".github/workflows/frontend.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: vite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vite/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run

  build:
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: vite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vite/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build