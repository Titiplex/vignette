<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Scenarios</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
<header class="main-header">
    <div class="sticky-header">
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/pages/languages.html">Languages</a></li>
            <li><a href="/pages/scenarios.html">Scenarios</a></li>
            <li id="createScenarioLink"><a href="/pages/create_scenario.html">Create scenario</a></li>
            <li id="profileLink"><a href="/pages/user.html">My profile</a></li>
            <li><a href="/pages/login.html" id="loginLink">Login</a></li>
        </ul>
    </div>
    <div class="card">
        <h1>Open Scenario Gallery</h1>
        <p class="text">Browse all published scenarios and open one to view its thumbnails and audio recordings.</p>
    </div>
</header>

<main>
    <section class="card">
        <h2>Reusable templates</h2>
        <p class="text">Reuse scenarios published by other users or publish your own scenarios as templates.</p>

        <div class="template-toolbar">
            <label class="field" for="templateLanguageFilter">
                <span>Filter by language id</span>
                <input id="templateLanguageFilter" type="text" placeholder="ex: fr"/>
            </label>
            <button id="templateRefreshBtn" type="button" class="secondary-btn">Refresh templates</button>
        </div>

        <div id="templatesInfo" class="text"></div>
        <section id="templatesGrid" class="image-grid"></section>
    </section>

    <div id="scenariosInfo" class="text"></div>
    <section id="scenariosGrid" class="image-grid"></section>
</main>

<script type="module" src="/src/pages/scenarios.js"></script>
</body>
</html>
