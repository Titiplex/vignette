name: Publish API docs

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: dev
      APP_JWT_SECRET: docs-only-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven

      - name: Build jar
        run: mvn -B -DskipTests package

      # Assumes you set <finalName>${project.artifactId}</finalName> in pom.xml
      # so the boot jar is target/projet-info.jar (stable, not random).
      - name: Start API (java -jar)
        run: |
          JAR="target/projet-info.jar"
          echo "Starting $JAR"
          nohup java -jar "$JAR" \
            --server.port=8081 \
            --server.address=0.0.0.0 \
            > app.log 2>&1 &
          echo $! > app.pid

          # Give JVM a moment
          sleep 3

          echo "=== java process ==="
          ps -p "$(cat app.pid)" -o pid,cmd || true

          echo "=== last logs (early) ==="
          tail -n 120 app.log || true

      - name: Diagnostics (listen ports + ipv4/ipv6)
        run: |
          echo "=== listening ports ==="
          ss -ltnp || true

          echo "=== try curl IPv4 + IPv6 ==="
          curl -v --max-time 2 http://127.0.0.1:8081/ || true
          curl -g -v --max-time 2 http://[::1]:8081/ || true

      - name: Wait for API and export OpenAPI
        run: |
          mkdir -p docs
          for i in {1..90}; do
            if curl -fsS http://127.0.0.1:8081/api/docs/openapi -o docs/openapi.json; then exit 0; fi
            if curl -fsS http://127.0.0.1:8081/v3/api-docs -o docs/openapi.json; then exit 0; fi
            if curl -fsS http://[::1]:8081/v3/api-docs -o docs/openapi.json; then exit 0; fi
            sleep 2
          done

          echo "API not ready. Listening ports:" >&2
          ss -ltnp >&2 || true
          echo "Last logs:" >&2
          tail -n 300 app.log >&2 || true
          exit 1

      - name: Stop API
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi

      - name: Upload app logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: app.log

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4