name: Publish API docs

on:
  workflow_dispatch:
  push:
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven

      - name: Build jar
        run: mvn -B -DskipTests package

      - name: Start API (java -jar)
        run: |
          JAR="$(ls -1 target/*.jar | grep -v 'original' | head -n 1)"
          echo "Starting $JAR"
          nohup java -jar "$JAR" --server.port=8081 > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for API and export OpenAPI
        run: |
          mkdir -p docs
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8081/api/docs/openapi -o docs/openapi.json; then
              exit 0
            fi
            sleep 2
          done
          echo "API not ready. Logs:" >&2
          tail -n 200 app.log >&2 || true
          exit 1

      - name: Stop API
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
