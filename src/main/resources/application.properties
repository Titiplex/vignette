server.port=8081
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.web.resources.static-locations=classpath:/static/
spring.application.name=Vignettes
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:file:./data/bootapp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.jpa.hibernate.ddl-auto=update
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Enable batch inserts
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true
spring.jpa.open-in-view=false
# Show SQL for debugging (optional, remove in production)
# spring.jpa.show-sql=true
server.error.path=/error2

app.jwt.secret=change-me-to-a-long-random-secret-at-least-32-bytes
springdoc.swagger-ui.path=/api/docs
springdoc.api-docs.path=/api/docs/openapi

# Dedicated datasource for shared scenario templates
app.templates.datasource.driver-class-name=org.h2.Driver
app.templates.datasource.url=jdbc:h2:file:./data/scenario-templates;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
app.templates.datasource.username=sa
app.templates.datasource.password=
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.show-actuator=false
# enables JavaDoc descriptions
springdoc.override-with-generic-response=false
